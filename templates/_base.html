<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}فروشگاه دیجیتال آبی{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- فونت و بوت‌استرپ -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        * {
            font-family: 'Vazirmatn', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
        }

        /* ناوبری */
        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 700;
            font-size: 1.4rem;
        }

        .nav-link {
            color: #e3f2fd !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #ffffff !important;
        }

        /* قهرمان (hero) */
        .hero {
            padding: 60px 0;
            background-color: #f1f7ff;
            text-align: center;
        }

        .hero h1 {
            color: #0d6efd;
            font-size: 2.8rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.1rem;
            color: #333;
        }

        .btn-main {
            background-color: #0d6efd;
            color: #fff;
            border-radius: 30px;
            padding: 10px 30px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
        }

        .btn-main:hover {
            background-color: #084fc3;
        }

        /* فوتر */
        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            color: #6c757d;
            padding: 2rem 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .container {
            max-width: 1140px;
        }
    </style>
</head>
<body>

<!-- نوار بالا -->
<nav class="navbar navbar-expand-lg shadow-sm fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'products_list' %}">دیجی‌شاپ</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon text-light"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'products_list' %}">محصولات</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'products_create' %}">افزودن محصول</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'cart_detail' %}">سبد خرید</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- فاصله از بالای صفحه -->
<div style="height: 72px;"></div>

<!-- سکشن معرفی -->
<section class="hero">
    <div class="container">
        <h1>به فروشگاه دیجیتال آبی خوش آمدید</h1>
        <p>خریدی مطمئن، سریع و با طراحی مدرن</p>
        <a href="{% url 'products_list' %}" class="btn btn-main mt-3">شروع خرید</a>
    </div>
</section>

<!-- محتوای اصلی -->
<main class="container py-5">
    {% block content %}
    {% endblock %}
</main>

<!-- فوتر -->
<footer>
    © 2025 دیجی‌شاپ | طراحی‌شده با ❤️ توسط سینا جوکار
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
